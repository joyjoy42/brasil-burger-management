services:
  # Service Symfony
  brasil-burger-symfony:
    build:
      context: ./BrasilBurger_Symfony
      dockerfile: Dockerfile.simple
    container_name: brasil-burger-symfony
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./BrasilBurger_Symfony:/var/www/html
      - ./BrasilBurger.db:/var/www/html/BrasilBurger.db
    networks:
      - brasil-burger-network
    command: >
      sh -c "
        composer install --no-dev --optimize-autoloader --no-interaction &&
        php-fpm
      "

  # Service Nginx
  nginx:
    image: nginx:alpine
    container_name: brasil-burger-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./BrasilBurger_Symfony/public:/var/www/html/public
      - ./BrasilBurger_Symfony/uploads:/var/www/html/uploads
    networks:
      - brasil-burger-network

networks:
  brasil-burger-network:
    driver: bridge
