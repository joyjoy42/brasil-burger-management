services:
  - type: web
    name: brasil-burger-symfony
    plan: free
    runtime: docker
    dockerContext: ./BrasilBurger_Symfony
    dockerfilePath: ./BrasilBurger_Symfony/Dockerfile.vendor
    healthCheckPath: /login
    envVars:
      - key: DATABASE_URL
        value: sqlite:///var/www/html/BrasilBurger.db
      - key: APP_SECRET
        generateValue: true
      - key: APP_ENV
        value: prod
      - key: TRUSTED_PROXIES
        value: "127.0.0.1,REMOTE_ADDR"
      - key: TRUSTED_HOSTS
        value: "^.*$"
    disk:
      name: brasil-burger-disk
      mountPath: /var/www/html
      sizeGB: 1
