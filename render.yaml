databases:
  - name: brasil-burger-db
    plan: free

services:
  - type: web
    name: brasil-burger-symfony
    plan: free
    runtime: docker
    dockerContext: ./BrasilBurger_Symfony
    dockerfilePath: ./BrasilBurger_Symfony/Dockerfile
    healthCheckPath: /login
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: brasil-burger-db
          property: connectionString
      - key: APP_SECRET
        generateValue: true
      - key: APP_ENV
        value: prod
      - key: TRUSTED_PROXIES
        value: "127.0.0.1,REMOTE_ADDR"
      - key: TRUSTED_HOSTS
        value: "^.*$"
